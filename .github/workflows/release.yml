name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    permissions:
      contents: write
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Package install helper (preserve exec bit via zip)
        run: |
          chmod +x install-helper.command
          zip -j install-helper.zip install-helper.command

      - name: Build & publish release (Universal macOS)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "qiitto-desktop ${{ github.ref_name }}"
          releaseBody: |
            ## 🆕 v0.3.0 — note 対応

            **複数プラットフォーム対応**：1 つの素材から Qiita と note の両方の記事を生成できるようになりました。

            - 📘 **Qiita モード**：技術記事 / コード多め / ハマったポイント中心（従来通り）
            - 📝 **note モード**：エッセイ調 / 体験と気づき / ナラティブ構成 / コード最小限

            note 向けに生成した記事は「📋 コピー & note で書く」ボタンで note.com の新規投稿画面が開きます（手動貼付）。

            ## 📥 インストール（3 方法から選択）

            ### 方法 1: ワンライナー（最も簡単）
            ```bash
            curl -fsSL https://raw.githubusercontent.com/cotton1101/qiitto-desktop/main/scripts/install.sh | bash
            ```

            ### 方法 2: 手動 + ヘルパー（ターミナル不要）
            1. **`qiitto-desktop_*.dmg`** をダウンロード → Applications にドラッグ
            2. **`install-helper.zip`** をダウンロード → 解凍 → 出てきた `install-helper.command` をダブルクリック
            3. ターミナルが自動で起動 → Gatekeeper 解除 → アプリ起動

            ### 方法 3: 上級者
            ```bash
            xattr -cr /Applications/qiitto-desktop.app && open /Applications/qiitto-desktop.app
            ```

            > ⚠️ Apple Developer ID 未取得のため Gatekeeper にブロックされます。Apple Developer Program 加入後に署名+Notarization 対応予定。

            **既に v0.2.0 以降をご利用の方**: 設定 → 「アップデートを確認」から自動更新できます（Gatekeeper 不要）。
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          args: --target universal-apple-darwin

      - name: Upload install helper to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: install-helper.zip
          fail_on_unmatched_files: true
