name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    permissions:
      contents: write
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Package install helper (preserve exec bit via zip)
        run: |
          chmod +x install-helper.command
          zip -j install-helper.zip install-helper.command

      - name: Build & publish release (Universal macOS)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "qiitto-desktop ${{ github.ref_name }}"
          releaseBody: |
            ## 🩹 v0.4.1 — Anthropic API 429 自動リトライ

            **大型素材 × 並列生成で頻発した 429 (rate limit) を自動でリトライするように**：

            - `retry-after` ヘッダ優先・なければ 5s / 15s / 45s の指数バックオフ
            - 0〜999ms のジッターで並列リクエスト衝突を緩和
            - 最大 3 回（生成）/ 2 回（X 投稿）/ 1 回（接続テスト）まで自動再試行
            - リトライ上限後のエラーメッセージを親切に（対処 4 通り掲載）

            ### 📦 v0.4.x までの累積機能

            - ⚡ 同じ素材から Qiita + note を並列同時生成（v0.4.0）
            - 📝 note 対応 + 自動アップデートボタン修正（v0.3.x）
            - 🛡 公開前スキャン + ✨ AI 書き換え + 🐦 X 投稿生成 + 🔄 自動アップデーター（v0.2.0〜）

            ## 🔄 v0.4.0 ユーザーへ

            **設定 → 「アップデートを確認」 → ダウンロードして再起動** でこの版に自動更新できます（Gatekeeper 不要）。

            ## 📥 インストール（3 方法から選択）

            ### 方法 1: ワンライナー（最も簡単）
            ```bash
            curl -fsSL https://raw.githubusercontent.com/cotton1101/qiitto-desktop/main/scripts/install.sh | bash
            ```

            ### 方法 2: 手動 + ヘルパー（ターミナル不要）
            1. **`qiitto-desktop_*.dmg`** をダウンロード → Applications にドラッグ
            2. **`install-helper.zip`** をダウンロード → 解凍 → 出てきた `install-helper.command` をダブルクリック
            3. ターミナルが自動で起動 → Gatekeeper 解除 → アプリ起動

            ### 方法 3: 上級者
            ```bash
            xattr -cr /Applications/qiitto-desktop.app && open /Applications/qiitto-desktop.app
            ```

            > ⚠️ Apple Developer ID 未取得のため Gatekeeper にブロックされます。Apple Developer Program 加入後に署名+Notarization 対応予定。

            **既に v0.2.0 以降をご利用の方**: 設定 → 「アップデートを確認」から自動更新できます（Gatekeeper 不要）。
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          args: --target universal-apple-darwin

      - name: Upload install helper to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: install-helper.zip
          fail_on_unmatched_files: true
